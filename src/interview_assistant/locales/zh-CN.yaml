knowledge:
  starter_header: |
    <!-- 这是一份示例知识库，请用你自己的内容替换。 -->
    <!-- 见 `interview-knowledge-format` skill 了解期望格式。 -->
  draft_header: |
    <!-- DRAFT：请审阅后将文件名前缀 `draft_` 去掉再使用。 -->
    <!-- LLM 在原文缺数据时可能用了 `[需补充]` 占位。 -->
  status_approved: "已审"
  status_draft: "草稿"
  status_invalid: "无效"
  validate_ok: "{file}: 通过"
  validate_warn: "{file}: {n} 处警告"
  validate_err: "{file}: {n} 处错误"
  ingest_estimating: "估算 token 数..."
  ingest_cost: "约 {tokens} tokens（~{cost}），继续？"
  ingest_writing: "写入 {path}"
  hint_first_run: "（首次提示，仅显示一次）"

