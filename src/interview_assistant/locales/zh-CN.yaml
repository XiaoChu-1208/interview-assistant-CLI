  done_quickstart: |
    你的知识库目前只有示例文件。要让助手真正帮到你，请按下面之一填充内容：

      1. AI 编辑器（推荐，最快）：
         在 Cursor 或 Claude Code 里打开本目录，把简历拖进对话，然后说：
           "用 interview-knowledge-format skill，
            按规范帮我整理 Q&A，写到 knowledge/ 下。"

      2. 命令行：
         interview-assistant knowledge new        # 一题一题问
         interview-assistant knowledge ingest <文件>   # PDF/DOCX/MD/TXT
         interview-assistant knowledge validate

      3. 手写 —— 照 knowledge/00_starter.md 改。

    然后运行 `interview-assistant` 启动实时助手。
