knowledge:
  starter_header: |
    <!-- This is a starter knowledge base. Replace it with your own content. -->
    <!-- See `interview-knowledge-format` skill for the expected format. -->
  draft_header: |
    <!-- DRAFT: please review and rename this file (drop the `draft_` prefix) before relying on it. -->
    <!-- The LLM may have used `[需补充]` placeholders where source data was missing. -->
  status_approved: "approved"
  status_draft: "draft"
  status_invalid: "invalid"
  validate_ok: "{file}: OK"
  validate_warn: "{file}: {n} warning(s)"
  validate_err: "{file}: {n} error(s)"
  ingest_estimating: "Estimating tokens..."
  ingest_cost: "About {tokens} tokens (~{cost}); proceed?"
  ingest_writing: "Writing to {path}"
  hint_first_run: "(first-run hint, shown once)"

skills:
  installing: "Installing {name} → {path}"
  installed: "{name} installed at {path}"
  scan_ok: "runtime hook OK: {name} loaded {n} entries"
  upgrade_available: "{name}: {old} → {new}"
  uninstalled: "{name} removed from {path}"
