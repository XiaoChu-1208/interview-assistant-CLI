app:
  name: "Interview Assistant"
  tagline: "real-time STT  ·  hybrid RAG  ·  v{version}"

common:
  yes: "y"
  no: "n"
  ok: "OK"
  cancel: "cancel"
  skip: "skip"
  done: "done"
  failed: "failed"
  warn: "warning"
  press_enter: "(press Enter to continue)"

init:
  language_prompt: "Choose language / 请选择语言:"
  language_zh: "中文 (Chinese)"
  language_en: "English"
  welcome: "Welcome to Interview Assistant"
  welcome_sub: "Let's get you set up in under 5 minutes."
  step_mode: "Step 1 — Pick a mode"
  mode_recall: "A) Instant-recall only (Whisper STT + your local Q&A, NO chat LLM — recommended if you've prepared answers)"
  mode_groq: "B) Full online with Groq (Whisper + Llama-3.3, free tier, no credit card)"
  mode_byo: "C) Bring your own chat key (OpenAI / DeepSeek / OpenRouter / any OpenAI-compatible)"
  mode_offline: "D) Fully offline (local Whisper, no LLM)"
  mode_recall_explain: |
    Instant-recall mode: the app transcribes the interviewer, retrieves the
    closest entry from your knowledge base, and prints YOUR answer verbatim.
    No chat-LLM call ever happens. Cheaper, faster, fully predictable —
    you only need a Groq Whisper key (or local Whisper).
  step_doctor: "Step 2 — Environment check"
  step_chat: "Step 3 — Chat model"
  step_stt: "Step 4 — Speech-to-text"
  step_kb: "Step 5 — Knowledge base"
  step_skills: "Step 6 — Install skills"
  step_audio: "Step 7 — Audio devices"
  done_title: "All set."
  done_quickstart_title: "Quick start"
  done_quickstart: |
    Your knowledge base only has the starter file right now. To add real content:

      1. AI editor (recommended, fastest):
         Open this folder in Cursor or Claude Code, drop your résumé into chat,
         then say:
           "Use the interview-knowledge-format skill. Turn this into Q&A files
            under knowledge/."

      2. CLI:
         interview-assistant knowledge new        # interactive entry
         interview-assistant knowledge ingest <file>   # PDF/DOCX/MD/TXT
         interview-assistant knowledge validate

      3. Hand-write — copy knowledge/00_starter.md as a template.

    Then run `interview-assistant` to start the live assistant.
  groq_url: "Get a Groq API key (free, no credit card): https://console.groq.com/keys"
  net_probe_internet: "Checking general internet..."
  net_probe_target: "Checking {provider} reachability..."
  net_ok: "OK ({ms}ms)"
  net_fail: "blocked ({err})"
  net_blocked_intro: |
    Cannot reach {provider} from this network. This is normal in mainland
    China or behind some corporate firewalls. We can route through a local
    HTTP proxy.
  net_proxy_detected_system: "Detected system proxy: {proxy}"
  net_proxy_detected_scan: "Detected listening proxy ports:"
  net_proxy_try: "Try {proxy}?"
  net_proxy_ok: "Proxy works. Saved to config."
  net_proxy_bad: "That proxy didn't relay traffic — try another."
  net_proxy_manual: "Enter proxy URL (e.g. http://127.0.0.1:7890), or blank to skip"
  net_proxy_help: |
    Most users on a VPN client already have a local proxy:
      Clash / Clash Verge          http://127.0.0.1:7890
      Surge                        http://127.0.0.1:6152
      V2RayN                       http://127.0.0.1:10809
      Stash                        http://127.0.0.1:7777
    Open your VPN app's settings — look for "HTTP proxy" or "Allow LAN".
    If you have no proxy at all, skip this step and pick offline mode (D)
    or instant-recall mode (A).
  enter_groq_key: "Paste your Groq API key (sk-...)"
  enter_chat_endpoint: "Chat endpoint base URL"
  enter_chat_key: "Chat API key"
  enter_chat_model: "Chat model name"
  enter_fast_model: "Fast/outline model name (smaller, cheaper)"
  test_connectivity: "Testing connectivity..."
  ptt_prompt: "Push-to-Talk hotkey"
  ptt_alt_r: "Right Option ⌥ (default — Discord-style)"
  ptt_f8: "F8 (no system conflicts)"
  ptt_cmd_r: "Right Cmd"
  ptt_ctrl_r: "Right Ctrl"
  ptt_f5: "F5 (warning: triggers Siri on macOS)"
  kb_existing: "Found {n} existing markdown file(s) in ./knowledge/."
  kb_copy_starter: "Copy starter knowledge to ./knowledge/00_starter.md?"
  skills_targets: "Where to install skills?"
  skills_target_cursor_local: "Project-level Cursor (./.cursor/skills/) — recommended"
  skills_target_cursor_user: "User-level Cursor (~/.cursor/skills/)"
  skills_target_claude_local: "Project-level Claude Code (./.claude/skills/)"
  skills_target_claude_user: "User-level Claude Code (~/.claude/skills/)"
  skills_target_agents: "Append to ./AGENTS.md (Codex / generic)"

